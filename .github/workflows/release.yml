name: Compila e Rilascia Automaticamente

# Questo script si avvia SOLO quando su GitHub viene creato un tag che inizia con "v" (es. v0.0.2)
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Compila Eseguibile Windows
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Estrai il codice dal repository
        uses: actions/checkout@v4

      - name: Prepara l'ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa le librerie necessarie
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 pypdf pyinstaller

      - name: Compila il programma (.exe)
        run: |
          pyinstaller --noconsole --onefile --name GestioneFeriePAR main.py

      - name: Crea la Release su GitHub e carica l'eseguibile
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GestioneFeriePAR.exe
          name: Versione ${{ github.ref_name }}
          body: "Aggiornamento automatico generato da GitHub Actions."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
